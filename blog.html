<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Paris Mollo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .blog-card {
            display: block;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 12px;
            text-decoration: none;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .blog-card:hover {
            border-color: #444;
            background-color: var(--surface-2);
        }

        .blog-card-date {
            font-size: 0.78rem;
            color: var(--text-tertiary);
            letter-spacing: 0.04em;
        }

        .blog-card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 8px 0 6px;
            letter-spacing: -0.01em;
        }

        .blog-card-summary {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .blog-card-read {
            font-size: 0.82rem;
            color: var(--text-tertiary);
        }

        .blog-card:hover .blog-card-read {
            color: var(--text-primary);
        }

        .back-link {
            display: inline-block;
            font-size: 0.85rem;
            color: var(--text-tertiary);
            margin-bottom: 32px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="container">
            <a href="index.html" class="back-link">&larr; Back</a>
            <h1>Blog</h1>
            <p class="job-title">Personal projects & thoughts</p>
        </div>
    </header>

    <div class="container">
        <section id="blog-posts">
            <div id="blog-list">
                <p style="color: var(--text-tertiary);">Loading posts...</p>
            </div>
        </section>
    </div>

    <footer>
        <div class="container">Paris Mollo &copy; 2026</div>
    </footer>

    <script src="blog.js"></script>
</body>
</html>
